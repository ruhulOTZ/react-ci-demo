name: React CI Pipeline

on:
  push:
    branches:
      - development

jobs:
  build-and-test:
    name: Build & Test React App
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Build the app
        run: npm run build

      - name: Confirm build output
        run: ls -la build/
